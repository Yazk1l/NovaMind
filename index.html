<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaMind - Login & Register</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/pixel.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <!-- Background Stars -->
  <div class="stars" id="starsContainer"></div>

  <!-- Auth Container -->
  <div class="auth-container">
    <div class="auth-box">
      <!-- Header -->
      <div class="auth-header">
        <div class="auth-emoji">🌌</div>
        <div class="auth-logo">NOVAMIND</div>
        <div class="auth-subtitle">LEVEL UP YOUR LEARNING</div>
      </div>

      <!-- Error/Success Message -->
      <div id="message"></div>

      <!-- LOGIN FORM -->
      <div id="loginForm">
        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label">> USERNAME/EMAIL</label>
            <input type="text" id="loginUsername" class="form-input" placeholder="username atau email" required>
          </div>

          <div class="form-group">
            <label class="form-label">> PASSWORD</label>
            <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required>
          </div>

          <div class="checkbox-group">
            <input type="checkbox" id="rememberMe">
            <label for="rememberMe">Ingat saya</label>
          </div>

          <div class="form-buttons">
            <button type="submit" class="btn-auth">▶ LOGIN</button>
          </div>
        </form>

        <div class="auth-links">
          <a href="#" class="auth-link">Lupa password?</a>
        </div>
      </div>

      <!-- REGISTER FORM (Hidden) -->
      <div id="registerForm" class="hidden">
        <form onsubmit="handleRegister(event)">
          <div class="form-group">
            <label class="form-label">> USERNAME</label>
            <input type="text" id="regUsername" class="form-input" placeholder="3-20 karakter" required>
          </div>

          <div class="form-group">
            <label class="form-label">> EMAIL</label>
            <input type="email" id="regEmail" class="form-input" placeholder="email@example.com" required>
          </div>

          <div class="form-group">
            <label class="form-label">> PASSWORD</label>
            <input type="password" id="regPassword" class="form-input" placeholder="minimal 6 karakter" required>
            <div class="password-strength" id="passwordStrength"></div>
            <div class="strength-text" id="strengthText"></div>
          </div>

          <div class="form-group">
            <label class="form-label">> KONFIRMASI PASSWORD</label>
            <input type="password" id="regPasswordConfirm" class="form-input" placeholder="ulangi password" required>
          </div>

          <div class="form-group">
            <label class="form-label">> KELAS</label>
            <select id="regKelas" required>
              <option value="">-- Pilih Kelas --</option>
              <option value="X">Kelas X</option>
              <option value="XI">Kelas XI</option>
              <option value="XII">Kelas XII</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">> JURUSAN</label>
            <select id="regJurusan" required>
              <option value="">-- Pilih Jurusan --</option>
              <option value="IPA">IPA</option>
              <option value="IPS">IPS</option>
              <option value="Bahasa">Bahasa</option>
              <option value="TKJ">TKJ</option>
              <option value="RPL">RPL</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">> WARNA AVATAR</label>
            <div class="color-picker" id="colorPicker"></div>
          </div>

          <div class="form-buttons">
            <button type="submit" class="btn-auth">✓ DAFTAR</button>
          </div>
        </form>
      </div>

      <!-- Toggle Form -->
      <div class="toggle-form">
        <button type="button" class="toggle-btn-auth active" onclick="switchForm('login')">LOGIN</button>
        <button type="button" class="toggle-btn-auth" onclick="switchForm('register')">DAFTAR</button>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Generate random stars
    function generateStars() {
      const container = document.getElementById('starsContainer');
      for (let i = 0; i < 50; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 3 + 's';
        container.appendChild(star);
      }
    }

    // Generate color picker
    function generateColorPicker() {
      const colors = ['#A78BFA', '#06B6D4', '#F472B6', '#F59E0B', '#10B981', '#3B82F6', '#EC4899', '#8B5CF6'];
      const container = document.getElementById('colorPicker');
      colors.forEach(color => {
        const option = document.createElement('div');
        option.className = 'color-option';
        option.style.backgroundColor = color;
        option.dataset.color = color;
        option.onclick = () => selectColor(color, option);
        container.appendChild(option);
      });
    }

    function selectColor(color, element) {
      document.querySelectorAll('.color-option').forEach(e => e.classList.remove('selected'));
      element.classList.add('selected');
      document.getElementById('selectedColor').value = color;
    }

    // Form switching
    function switchForm(form) {
      if (form === 'login') {
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('registerForm').classList.add('hidden');
        document.querySelectorAll('.toggle-btn-auth')[0].classList.add('active');
        document.querySelectorAll('.toggle-btn-auth')[1].classList.remove('active');
      } else {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('registerForm').classList.remove('hidden');
        document.querySelectorAll('.toggle-btn-auth')[0].classList.remove('active');
        document.querySelectorAll('.toggle-btn-auth')[1].classList.add('active');
      }
    }

    // Password strength check
    document.getElementById('regPassword')?.addEventListener('input', function() {
      const strength = checkPasswordStrength(this.value);
      const bars = document.getElementById('passwordStrength');
      const text = document.getElementById('strengthText');
      
      bars.innerHTML = '';
      for (let i = 0; i < 5; i++) {
        const bar = document.createElement('div');
        bar.className = 'strength-bar';
        if (i < strength.score) {
          bar.className += ` ${strength.level}`;
        }
        bars.appendChild(bar);
      }
      
      text.textContent = strength.level.toUpperCase();
    });

    // Handlers
    function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('loginUsername').value;
      const password = document.getElementById('loginPassword').value;
      
      const result = login(username, password);
      const msgEl = document.getElementById('message');
      
      if (result.success) {
        msgEl.innerHTML = '<div class="success-message">✓ Login berhasil! Redirecting...</div>';
        setTimeout(() => window.location.href = 'dashboard.html', 1500);
      } else {
        msgEl.innerHTML = `<div class="error-message">✗ ${result.error}</div>`;
      }
    }

    function handleRegister(e) {
      e.preventDefault();
      const username = document.getElementById('regUsername').value;
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      const passwordConfirm = document.getElementById('regPasswordConfirm').value;
      const kelas = document.getElementById('regKelas').value;
      const jurusan = document.getElementById('regJurusan').value;
      const avatarColor = document.querySelector('.color-option.selected')?.dataset.color || '#A78BFA';
      
      const result = register(username, email, password, passwordConfirm, kelas, jurusan, avatarColor);
      const msgEl = document.getElementById('message');
      
      if (result.success) {
        msgEl.innerHTML = '<div class="success-message">✓ Pendaftaran berhasil! Redirecting...</div>';
        setTimeout(() => window.location.href = 'dashboard.html', 1500);
      } else {
        msgEl.innerHTML = `<div class="error-message">✗ ${result.error}</div>`;
      }
    }

    // Init
    window.addEventListener('load', () => {
      generateStars();
      generateColorPicker();
      redirectIfLoggedIn();
      document.querySelector('.color-option').classList.add('selected');
    });
  </script>
</body>
</html>
